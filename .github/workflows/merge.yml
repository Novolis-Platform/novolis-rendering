name: 'CI: main'

on:
  push:
    branches: [main]
    paths-ignore:
      - '.novolis/version.props'
  workflow_dispatch:
    inputs:
      skip_publish:
        description: Build and bump only; do not push to GitHub Packages
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  merge_job:
    name: Build, publish, bump build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: Novolis-Platform/novolis-math
          path: novolis-math
      - uses: Novolis-Platform/novolis-workflows/actions/setup-dotnet@main
        with:
          dotnet-version: '10.0.x'
      - name: Pack Math.Geometry for restore
        shell: pwsh
        run: ./scripts/ci-pack-dependencies.ps1 -MathRoot "${{ github.workspace }}/novolis-math"
      - uses: Novolis-Platform/novolis-workflows/actions/restore@main
      - uses: Novolis-Platform/novolis-workflows/actions/build@main
      - uses: Novolis-Platform/novolis-workflows/actions/test@main
      - uses: Novolis-Platform/novolis-workflows/actions/pack@main
      - uses: Novolis-Platform/novolis-workflows/actions/detect-changes@main
        id: changes
      - uses: Novolis-Platform/novolis-workflows/actions/publish-github-packages@main
        if: inputs.skip_publish == false && steps.changes.outputs.should_publish == 'true'
      - uses: Novolis-Platform/novolis-workflows/actions/bump-build-version@main
        id: bump
        if: success() && inputs.skip_publish == false && steps.changes.outputs.should_publish == 'true'

      - name: Commit build version bump
        if: success() && inputs.skip_publish == false && steps.changes.outputs.should_publish == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .novolis/version.props
          if git diff --staged --quiet; then
            echo "No version file changes to commit."
            exit 0
          fi
          git commit -m "chore: bump build to ${{ steps.bump.outputs.next_version }} [skip ci]"
          git push || echo "::warning::Could not push version bump (branch protection?). Published packages are on GitHub Packages."
