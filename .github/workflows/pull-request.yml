name: 'CI: pull request'

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pull_request_job:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Novolis-Platform/novolis-math
          path: novolis-math
      - uses: Novolis-Platform/novolis-workflows/actions/setup-dotnet@main
        with:
          dotnet-version: '10.0.x'
      - name: Pack Math.Geometry for restore
        shell: pwsh
        run: ./scripts/ci-pack-dependencies.ps1 -MathRoot "${{ github.workspace }}/novolis-math"
      - uses: Novolis-Platform/novolis-workflows/actions/restore@main
      - uses: Novolis-Platform/novolis-workflows/actions/build@main
      - uses: Novolis-Platform/novolis-workflows/actions/test@main
